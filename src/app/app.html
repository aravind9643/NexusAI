<div class="app-layout" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Animated Background -->
  <div class="bg-effects">
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>
    <div class="bg-gradient-3"></div>
    <div class="noise-overlay"></div>
  </div>

  <!-- Sidebar -->
  <app-sidebar />

  <!-- Main Content -->
  <main class="main-content">
    <app-chat-view (openSettings)="openSettings()" />
  </main>

  <!-- Settings Dialog -->

  <!-- Settings Dialog -->
  @if (showSettings()) {
    <app-settings-dialog (closed)="closeSettings()" />
  }
</div>

<!-- Toast Notifications -->
<app-toast-container />
